# ArcPay nginx config
# Place at: /etc/nginx/sites-available/arcpay
# Enable: sudo ln -s /etc/nginx/sites-available/arcpay /etc/nginx/sites-enabled/
# Test:   sudo nginx -t && sudo systemctl reload nginx

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt certs (certbot fills these in)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── React frontend (static build) ────────────────────────────────────────
    root  /var/www/arcpay/frontend/dist;
    index index.html;

    # All non-API routes → React Router (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API proxy ─────────────────────────────────────────────────────
    # All routes the Express server owns
    location ~* ^/(api|auth|merchants|payments|health)(/|$) {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── NGN FX service proxy (internal — not exposed publicly by default) ──────
    # Uncomment if you want /ngn/rate reachable from the public internet:
    # location /ngn/ {
    #     rewrite   ^/ngn/(.*)$ /$1 break;
    #     proxy_pass http://127.0.0.1:3002;
    # }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml;
    gzip_min_length 256;
}
