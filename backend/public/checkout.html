<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcPay Checkout</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo { font-size: 1.1rem; font-weight: 700; color: #6c47ff; margin-bottom: 2rem; letter-spacing: -0.3px; }

    .amount {
      font-size: 3rem;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1;
    }
    .amount span { font-size: 1.4rem; color: #666; font-weight: 500; }

    .label { color: #888; font-size: .85rem; margin-top: .4rem; margin-bottom: 2rem; }

    .status-badge {
      display: inline-block;
      padding: .25rem .75rem;
      border-radius: 99px;
      font-size: .8rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }
    .status-pending  { background: #fff3cd; color: #856404; }
    .status-paid     { background: #d1e7dd; color: #0a5c36; }
    .status-released { background: #cfe2ff; color: #084298; }
    .status-refunded { background: #f8d7da; color: #842029; }

    button {
      width: 100%;
      padding: .9rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }
    button:not(:disabled):hover { opacity: .88; }

    .btn-primary { background: #6c47ff; color: #fff; }
    .btn-success { background: #198754; color: #fff; }

    .step {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .6rem .8rem;
      border-radius: 10px;
      background: #f8f9fa;
      margin-bottom: .5rem;
      font-size: .85rem;
      color: #555;
      text-align: left;
    }
    .step .icon { font-size: 1.1rem; min-width: 1.4rem; text-align: center; }
    .step.done { background: #d1e7dd; color: #0a5c36; }
    .step.active { background: #e8e2ff; color: #4a2dbb; font-weight: 600; }

    #steps { margin: 1.5rem 0; }

    .error { color: #842029; background: #f8d7da; border-radius: 10px; padding: .7rem 1rem; font-size: .85rem; margin-bottom: 1rem; }
    .network-hint { font-size: .75rem; color: #aaa; margin-top: 1.2rem; }
    #tx-link { font-size: .78rem; color: #6c47ff; word-break: break-all; margin-top: .5rem; text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">⚡ ArcPay</div>

  <div id="loading" style="color:#888">Loading payment…</div>

  <div id="payment-ui" style="display:none">
    <div class="amount" id="amount-display"></div>
    <div class="label">USDC on Arc</div>
    <div id="status-badge" class="status-badge"></div>

    <div id="error" class="error" style="display:none"></div>

    <div id="steps"></div>

    <button id="main-btn" class="btn-primary" onclick="advance()">Connect Wallet</button>

    <div class="network-hint">Powered by Arc · gas paid in USDC</div>
    <a id="tx-link" href="#" target="_blank" style="display:none"></a>
  </div>

  <div id="success-ui" style="display:none">
    <div style="font-size:3rem;margin-bottom:1rem">✅</div>
    <div style="font-size:1.3rem;font-weight:700;margin-bottom:.5rem">Payment Complete</div>
    <div style="color:#666;font-size:.9rem">Your USDC has been received.</div>
    <a id="success-tx" href="#" target="_blank" style="display:block;margin-top:1rem;font-size:.78rem;color:#6c47ff;word-break:break-all"></a>
  </div>
</div>

<script type="module">
  import { BrowserProvider, Contract, parseUnits, formatUnits } from "https://esm.sh/ethers@6.13.0";

  const ARCPAY_ABI = [
    "function createPayment(bytes32 paymentId, address merchant, uint256 amount) external",
    "function pay(bytes32 paymentId) external",
    "function payments(bytes32) view returns (address payer, address merchant, uint256 amount, uint8 status)",
  ];
  const USDC_ABI = [
    "function approve(address spender, uint256 amount) returns (bool)",
    "function allowance(address owner, address spender) view returns (uint256)",
    "function balanceOf(address) view returns (uint256)",
  ];

  const paymentId = "/" + location.pathname.split("/pay/")[1];
  const BACKEND   = location.origin;

  let payment, provider, signer, arcPay, usdc;
  let stage = 0; // 0=connect 1=createOnChain 2=approve 3=pay 4=done

  const STEPS = [
    { icon: "🔗", label: "Connect wallet" },
    { icon: "📝", label: "Register payment on-chain" },
    { icon: "✅", label: "Approve USDC" },
    { icon: "💸", label: "Send payment" },
  ];

  function renderSteps() {
    const el = document.getElementById("steps");
    el.innerHTML = STEPS.map((s, i) => {
      const cls = i < stage ? "done" : i === stage ? "active" : "";
      const icon = i < stage ? "✓" : s.icon;
      return `<div class="step ${cls}"><span class="icon">${icon}</span>${s.label}</div>`;
    }).join("");
  }

  function setError(msg) {
    const el = document.getElementById("error");
    if (msg) { el.textContent = msg; el.style.display = ""; }
    else el.style.display = "none";
  }

  function setBtn(label, disabled = false) {
    const btn = document.getElementById("main-btn");
    btn.textContent = label;
    btn.disabled = disabled;
  }

  function showTx(hash) {
    const a = document.getElementById("tx-link");
    a.href = `https://explorer.testnet.arc.network/tx/${hash}`;
    a.textContent = `tx: ${hash}`;
    a.style.display = "block";
  }

  async function loadPayment() {
    const res = await fetch(`${BACKEND}/api/pay${paymentId}`);
    payment = await res.json();
    if (!res.ok) { document.getElementById("loading").textContent = payment.error; return; }

    document.getElementById("loading").style.display = "none";
    document.getElementById("payment-ui").style.display = "block";

    const usdc_amount = Number(payment.amount) / 1e6;
    document.getElementById("amount-display").innerHTML = `${usdc_amount.toFixed(2)} <span>USDC</span>`;

    const badge = document.getElementById("status-badge");
    badge.textContent = payment.status.toUpperCase();
    badge.className = `status-badge status-${payment.status}`;

    if (payment.status !== "pending") {
      document.getElementById("main-btn").style.display = "none";
      document.getElementById("steps").style.display = "none";
      if (payment.status === "paid" || payment.status === "released") {
        document.getElementById("payment-ui").style.display = "none";
        document.getElementById("success-ui").style.display = "block";
      }
      return;
    }

    renderSteps();
  }

  async function advance() {
    setError(null);
    try {
      if (stage === 0) await connectWallet();
      else if (stage === 1) await registerOnChain();
      else if (stage === 2) await approveUsdc();
      else if (stage === 3) await sendPay();
    } catch (err) {
      setError(err.reason ?? err.message ?? String(err));
      setBtn(STEPS[stage].label.replace(/^\S+ /, "Retry: "));
    }
  }

  async function connectWallet() {
    if (!window.ethereum) throw new Error("MetaMask not found — install it and try again.");
    setBtn("Connecting…", true);
    provider = new BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer   = await provider.getSigner();
    arcPay   = new Contract(payment.arcpay_address, ARCPAY_ABI, signer);
    usdc     = new Contract(payment.usdc_address,   USDC_ABI,   signer);

    // Check if payment already exists on-chain
    const onChain = await arcPay.payments(payment.payment_id);
    if (onChain.merchant !== "0x0000000000000000000000000000000000000000") {
      stage = 2; // already registered, skip to approve
    } else {
      stage = 1;
    }
    renderSteps();
    setBtn(STEPS[stage].label);
  }

  async function registerOnChain() {
    setBtn("Sending transaction…", true);
    const tx = await arcPay.createPayment(payment.payment_id, payment.merchant_address, BigInt(payment.amount));
    showTx(tx.hash);
    setBtn("Waiting for confirmation…", true);
    await tx.wait();
    stage = 2;
    renderSteps();
    setBtn(STEPS[stage].label);
  }

  async function approveUsdc() {
    setBtn("Checking allowance…", true);
    const signerAddr = await signer.getAddress();
    const allowance  = await usdc.allowance(signerAddr, payment.arcpay_address);

    if (allowance >= BigInt(payment.amount)) {
      stage = 3;
      renderSteps();
      setBtn(STEPS[stage].label);
      return;
    }

    setBtn("Approving USDC…", true);
    const tx = await usdc.approve(payment.arcpay_address, BigInt(payment.amount));
    showTx(tx.hash);
    setBtn("Waiting for confirmation…", true);
    await tx.wait();
    stage = 3;
    renderSteps();
    setBtn(STEPS[stage].label);
  }

  async function sendPay() {
    setBtn("Sending payment…", true);
    const tx = await arcPay.pay(payment.payment_id);
    showTx(tx.hash);
    setBtn("Waiting for confirmation…", true);
    await tx.wait();

    document.getElementById("payment-ui").style.display = "none";
    const successTx = document.getElementById("success-tx");
    successTx.href = `https://explorer.testnet.arc.network/tx/${tx.hash}`;
    successTx.textContent = `tx: ${tx.hash}`;
    document.getElementById("success-ui").style.display = "block";
  }

  window.advance = advance;
  loadPayment();
</script>
</body>
</html>
